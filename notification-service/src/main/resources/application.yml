server:
  error:
    include-stacktrace: never
  port: 8815

spring:
  application:
    name: notification-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/notification_db}
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}
            required: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

app:
  mail:
    enabled: ${MAIL_ENABLED:true}
    from-name: ${MAIL_FROM_NAME:2T Coffee Shop}
    reply-to: ${MAIL_REPLY_TO:${MAIL_USERNAME:}}
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}
  timezone: ${APP_TIME_ZONE:Asia/Ho_Chi_Minh}
  kafka:
    notification-topic: notification-events
    order-topic: order-events
    payment-topic: payment-events

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - [%X{correlationId}] - %msg%n"

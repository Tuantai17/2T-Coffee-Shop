<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt Lại Mật Khẩu Thành Công</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; color: #333; }
        .container { max-width: 600px; margin: 40px auto; background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); overflow: hidden; }
        .header { background: linear-gradient(135deg, #10b981 0%, #059669 100%); padding: 30px 20px; text-align: center; }
        .header h1 { color: #fff; margin: 0; font-size: 24px; }
        .content { padding: 40px 30px; text-align: center; }
        .footer { background-color: #f8f9fa; padding: 20px; text-align: center; font-size: 14px; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>BrewMoments - Đặt Lại Mật Khẩu Thành Công</h1>
        </div>
        <div class="content">
            <p>Chào <strong th:text="${recipientName}">Bạn</strong>,</p>
            <p>Mật khẩu tài khoản của bạn tại BrewMoments vừa được đặt lại thành công.</p>
            <p>Nếu bạn không thực hiện thay đổi này, vui lòng liên hệ ngay với bộ phận hỗ trợ của chúng tôi để bảo vệ tài khoản.</p>
        </div>
        <div class="footer">
            &copy; 2026 BrewMoments. All rights reserved.
        </div>
    </div>
</body>
</html>

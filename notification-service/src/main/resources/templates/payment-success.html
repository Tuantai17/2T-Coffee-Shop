<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thanh Toán Thành Công</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; color: #333; }
        .container { max-width: 600px; margin: 40px auto; background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); overflow: hidden; }
        .header { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); padding: 30px 20px; text-align: center; }
        .header h1 { color: #fff; margin: 0; font-size: 24px; }
        .content { padding: 40px 30px; text-align: center; }
        .success-icon { font-size: 48px; color: #f59e0b; margin-bottom: 20px; }
        .footer { background-color: #f8f9fa; padding: 20px; text-align: center; font-size: 14px; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>BrewMoments - Thanh Toán Thành Công</h1>
        </div>
        <div class="content">
            <div class="success-icon">✔️</div>
            <p>Chào <strong th:text="${recipientName}">Bạn</strong>,</p>
            <p>Tuyệt vời! Bạn đã thanh toán thành công cho đơn hàng <strong>#<span th:text="${orderCode}">0000</span></strong> qua VNPay.</p>
            <p>Đơn hàng của bạn sẽ sớm được xử lý và giao đến bạn trong thời gian sớm nhất.</p>
        </div>
        <div class="footer">
            &copy; 2026 BrewMoments. All rights reserved.
        </div>
    </div>
</body>
</html>

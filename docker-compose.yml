version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ecom-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456"
    ports:
      - "5432:5432"
    volumes:
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: ecom-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: ecom-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ecom-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ecom-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped

  eureka-server:
    build:
      context: ./eureka-server
    container_name: ecom-eureka
    ports:
      - "8761:8761"
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
    container_name: ecom-gateway
    ports:
      - "8900:8900"
    depends_on:
      - eureka-server
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka
    restart: unless-stopped

  user-service:
    build:
      context: ./user-service
    container_name: ecom-user-service
    ports:
      - "8811:8811"
    depends_on:
      - postgres
      - kafka
      - eureka-server
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/user_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    restart: unless-stopped

  order-service:
    build:
      context: ./order-service
    container_name: ecom-order-service
    ports:
      - "8813:8813"
    depends_on:
      - postgres
      - kafka
      - eureka-server
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/order_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    restart: unless-stopped

  inventory-service:
    build:
      context: ./inventory-service
    container_name: ecom-inventory-service
    ports:
      - "8816:8816"
    depends_on:
      - postgres
      - kafka
      - eureka-server
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/inventory_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    restart: unless-stopped

  delivery-service:
    build:
      context: ./delivery-service
    container_name: ecom-delivery-service
    ports:
      - "8817:8817"
    depends_on:
      - postgres
      - kafka
      - eureka-server
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/delivery_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    restart: unless-stopped

  revenue-service:
    build:
      context: ./revenue-service
    container_name: ecom-revenue-service
    ports:
      - "8818:8818"
    depends_on:
      - postgres
      - redis
      - kafka
      - eureka-server
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/revenue_db
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    restart: unless-stopped

  notification-service:
    build:
      context: ./notification-service
    container_name: ecom-notification-service
    ports:
      - "8815:8815"
    depends_on:
      - mongodb
      - kafka
      - eureka-server
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/notification_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    restart: unless-stopped

volumes:
  pgdata:
  mongodata:
